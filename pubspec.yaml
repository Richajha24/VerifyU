name: verify_u
description: "VerifyU - Student Achievement Verification App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  google_sign_in: ^7.2.0

  # Verification engine
  google_mlkit_text_recognition: ^0.15.1
  http: ^1.6.0

  # UI and sharing
  image_picker: ^1.2.2
  qr_flutter: ^4.1.0
  share_plus: ^13.1.0
  provider: ^6.1.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true